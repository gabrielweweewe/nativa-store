<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

    <title>Nativa Store — Artesanato com Alma</title>
    <meta
      name="description"
      content="Bolsas artesanais autorais e exclusivas, criadas à mão para contar histórias brasileiras. Artesanato com alma." />
    <meta
      name="keywords"
      content="bolsas artesanais, artesanato brasileiro, nativa store, bolsas feitas à mão, bolsas autorais, feito à mão, brasil" />
    <meta name="author" content="Nativa Store" />
    <meta name="creator" content="Nativa Store" />
    <meta name="publisher" content="Nativa Store" />
    <meta name="application-name" content="Nativa Store" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#C4522A" />
    <meta name="msapplication-TileColor" content="#C4522A" />
    <meta name="msapplication-TileImage" content="/images/logo-nativa.png" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Nativa Store" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- canonical / hreflang são definidos em runtime (usePageMeta) com URL absoluta -->
    <link rel="icon" type="image/png" href="/images/logo-nativa.png" />
    <link rel="apple-touch-icon" href="/images/logo-nativa.png" />
    <link rel="shortcut icon" type="image/png" href="/images/logo-nativa.png" />
    <link rel="mask-icon" href="/images/logo-nativa.png" color="#C4522A" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nativa Store" />
    <meta property="og:title" content="Nativa Store — Artesanato com Alma" />
    <meta
      property="og:description"
      content="Bolsas artesanais autorais e exclusivas, criadas à mão para contar histórias brasileiras. Artesanato com alma." />
    <meta property="og:image" content="/images/bannerNativa.jpg" />
    <meta property="og:image:alt" content="Nativa Store — Artesanato com Alma" />
    <meta property="og:image:type" content="image/jpeg" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nativastore" />
    <meta name="twitter:creator" content="@nativastore" />
    <meta name="twitter:title" content="Nativa Store — Artesanato com Alma" />
    <meta
      name="twitter:description"
      content="Bolsas artesanais autorais e exclusivas, criadas à mão para contar histórias brasileiras. Artesanato com alma." />
    <meta name="twitter:image" content="/images/bannerNativa.jpg" />
    <meta name="twitter:image:alt" content="Nativa Store — Artesanato com Alma" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Nativa Store",
        "description": "Bolsas artesanais autorais e exclusivas, criadas à mão para contar histórias brasileiras. Artesanato com alma.",
        "logo": "/images/logo-nativa.png"
      }
    </script>

    <!-- LCP: só pré-carrega a variante certa por viewport -->
    <link
      rel="preload"
      as="image"
      href="/images/bannerNativa.webp"
      type="image/webp"
      media="(min-width: 640px)"
      fetchpriority="high" />
    <link
      rel="preload"
      as="image"
      href="/images/bannerNativa-mobile.webp"
      type="image/webp"
      media="(max-width: 639px)"
      fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter só no admin (carregado sob demanda). Na loja: Nunito + Playfair + Lora. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <!-- Meta Pixel: só inicializa se VITE_META_PIXEL_ID estiver definido no build -->
    <script>
      (function () {
        var pixelId = "%VITE_META_PIXEL_ID%";
        if (!pixelId || pixelId.indexOf("%") === 0) return;
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
        fbq("init", pixelId);
        fbq("track", "PageView");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
